<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parking Le Compendium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Scrollbar discrète sur le calendrier */
    #calendar-scroll::-webkit-scrollbar { height: 4px; }
    #calendar-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
    #calendar-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }
    /* Hauteur fixe des cellules */
    .cal-cell { height: 48px; }
    /* Colonne place fixe au scroll horizontal */
    .sticky-col {
      position: sticky;
      left: 0;
      z-index: 10;
      box-shadow: 2px 0 5px rgba(0,0,0,0.07);
    }
    /* Animation modale */
    #modal-overlay { transition: opacity 0.15s; }
    #modal-card { transition: transform 0.2s; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

  <!-- En-tête -->
  <header class="bg-indigo-600 text-white px-4 py-3 shadow-md">
    <div class="max-w-7xl mx-auto flex items-center gap-3">
      <span class="text-2xl">🅿️</span>
      <div>
        <h1 class="text-lg font-bold leading-tight">Parking Le Compendium</h1>
        <p class="text-indigo-200 text-xs">12 places · Résidence</p>
      </div>
    </div>
  </header>

  <!-- Légende -->
  <div class="bg-white border-b border-slate-100 px-4 py-2">
    <div class="max-w-7xl mx-auto flex flex-wrap gap-4 text-xs text-slate-500">
      <span class="flex items-center gap-1.5">
        <span class="w-3 h-3 rounded bg-green-200 inline-block"></span> Libre (réservable)
      </span>
      <span class="flex items-center gap-1.5">
        <span class="w-3 h-3 rounded bg-amber-200 inline-block"></span> Réservé
      </span>
      <span class="flex items-center gap-1.5">
        <span class="w-3 h-3 rounded bg-slate-100 inline-block border border-slate-200"></span> Indisponible
      </span>
      <span class="flex items-center gap-1.5 ml-auto text-indigo-500 font-medium cursor-pointer hover:underline" id="legend-tip">
        ⭐ Épinglez votre spot  ·  ✏️ Gérez votre place
      </span>
    </div>
  </div>

  <!-- Navigation par date -->
  <div class="bg-white border-b border-slate-100 shadow-sm sticky top-0 z-20 px-4 py-3">
    <div class="max-w-7xl mx-auto flex items-center justify-between gap-2">
      <button id="prev-day"
        class="w-14 h-14 flex items-center justify-center rounded-2xl hover:bg-indigo-50 active:bg-indigo-100 text-slate-600 text-3xl font-light transition-colors">
        ‹
      </button>
      <div class="text-center flex-1">
        <div id="date-display" class="font-semibold text-slate-800 capitalize text-sm sm:text-base"></div>
        <div id="today-chip" class="hidden mt-1.5">
          <button class="text-xs bg-indigo-50 text-indigo-600 hover:bg-indigo-100 font-medium px-3 py-1 rounded-full transition-colors">
            ↩ Aujourd'hui
          </button>
        </div>
      </div>
      <button id="next-day"
        class="w-14 h-14 flex items-center justify-center rounded-2xl hover:bg-indigo-50 active:bg-indigo-100 text-slate-600 text-3xl font-light transition-colors">
        ›
      </button>
    </div>
  </div>

  <!-- Calendrier -->
  <main class="max-w-7xl mx-auto px-4 py-4">
    <div id="loading" class="text-center py-12 text-slate-400">
      <div class="text-3xl mb-2">⏳</div>
      <p>Chargement…</p>
    </div>
    <div id="calendar-scroll" class="overflow-x-auto rounded-xl border border-slate-200 shadow-sm hidden">
      <div id="calendar" class="min-w-max"></div>
    </div>
  </main>

  <!-- Modale -->
  <div id="modal-overlay"
    class="hidden fixed inset-0 bg-black/40 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
    <div id="modal-card"
      class="bg-white w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl shadow-xl overflow-hidden flex flex-col max-h-[90vh]">
      <!-- Header modale -->
      <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">
        <h2 id="modal-title" class="font-semibold text-slate-800 text-base"></h2>
        <button id="modal-close"
          class="text-slate-400 hover:text-slate-600 text-2xl leading-none transition-colors">&times;</button>
      </div>
      <!-- Corps modale (scrollable) -->
      <div id="modal-body" class="px-5 py-4 overflow-y-auto flex-1 text-sm text-slate-700"></div>
      <!-- Actions modale -->
      <div id="modal-actions" class="flex gap-3 px-5 py-4 border-t border-slate-100 bg-white"></div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toast-container"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-2 pointer-events-none">
  </div>

  <script src="/app.js"></script>
</body>
</html>
